version: '3.9'

services:
  # ─── Node.js Backend ──────────────────────
  backend:
    image: metaspace-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      NODE_ENV: production
      DB_HOST: ${RDS_ENDPOINT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      JWT_SECRET: ${JWT_SECRET}
      AWS_REGION: ${AWS_REGION}
      AWS_BUCKET_NAME: ${AWS_BUCKET_NAME}
    networks:
      - metaspace-net

  # ─── React Frontend ───────────────────────
  frontend:
    image: metaspace-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - metaspace-net

networks:
  metaspace-net:
    driver: bridge
